<h2>Event-Driven Integration Service</h2>
<p><a href="https://github.com/PkLavc/event-driven-integration-service"><img src="https://img.shields.io/badge/Source-GitHub-black?logo=github" alt="Source Code"></a></p>
<h2>Technical Architecture</h2>
<h3>Event Processing Flow</h3>
<ol>
<li><strong>Ingress Layer</strong>: Provider-specific webhook endpoints receive HTTP POST requests</li>
<li><strong>Security Validation</strong>: HMAC signature verification using provider-specific secrets</li>
<li><strong>Idempotency Check</strong>: Atomic database constraint validation prevents duplicate processing</li>
<li><strong>Event Persistence</strong>: Atomic INSERT operation stores event with PENDING status</li>
<li><strong>Queue Dispatch</strong>: Event ID enqueued to BullMQ with exponential backoff configuration</li>
<li><strong>Asynchronous Processing</strong>: Worker processes events with retry logic and status updates</li>
<li><strong>Completion</strong>: Event status transitions to COMPLETED or DEAD_LETTER on failure</li>
</ol>
<h3>Technology Stack</h3>
<ul>
<li><strong>Runtime</strong>: Node.js 18+ with TypeScript 5.0+</li>
<li><strong>Framework</strong>: NestJS 10+ with dependency injection</li>
<li><strong>Database</strong>: PostgreSQL 15+ with Prisma ORM</li>
<li><strong>Queue System</strong>: BullMQ 5+ with Redis 7+</li>
<li><strong>Observability</strong>: OpenTelemetry 1.20+ with Jaeger</li>
<li><strong>Logging</strong>: Winston 3.11+ with structured JSON output</li>
</ul>
<h2>Reliability &amp; Resilience</h2>
<h3>Atomic Idempotency</h3>
<ul>
<li><strong>Unique Constraint</strong>: Composite unique index on (provider, eventId) prevents race conditions</li>
<li><strong>Atomic Operations</strong>: Single INSERT statement with constraint violation handling</li>
<li><strong>Status Tracking</strong>: Event lifecycle from PENDING -&gt; PROCESSING -&gt; COMPLETED/DEAD_LETTER</li>
<li><strong>Duplicate Handling</strong>: Existing events return 200 OK without reprocessing</li>
</ul>
<h3>Retry Strategy</h3>
<ul>
<li><strong>Maximum Attempts</strong>: 3 retry attempts per event</li>
<li><strong>Backoff Algorithm</strong>: Exponential delay (2^attempt * 1000ms)</li>
<li><strong>Failure Escalation</strong>: Events exceeding retry limit moved to dead letter queue</li>
</ul>
<h3>Dead Letter Queue</h3>
<ul>
<li><strong>Automatic Escalation</strong>: Events exceeding retry limit automatically moved</li>
<li><strong>Audit Trail</strong>: Complete processing history maintained for debugging</li>
<li><strong>Manual Recovery</strong>: Failed events can be requeued for retry</li>
</ul>
<h2>Observability Stack</h2>
<h3>Distributed Tracing</h3>
<ul>
<li><strong>Span Creation</strong>: Dedicated span for each event processing lifecycle</li>
<li><strong>Span Attributes</strong>: event.id, event.type, event.provider, retry_count</li>
<li><strong>Error Recording</strong>: Exceptions captured with full stack traces</li>
<li><strong>Trace Propagation</strong>: Correlation across service boundaries</li>
</ul>
<h3>Structured Logging</h3>
<ul>
<li><strong>Event Correlation</strong>: Automatic eventId injection in all log messages</li>
<li><strong>Structured Format</strong>: JSON output compatible with ELK/Datadog</li>
<li><strong>Log Levels</strong>: DEBUG, INFO, WARN, ERROR with appropriate categorization</li>
</ul>
<h2>Security Implementation</h2>
<h3>HMAC Signature Validation</h3>
<ul>
<li><strong>Algorithm</strong>: HMAC-SHA256 with provider secrets</li>
<li><strong>Timing Attack Protection</strong>: Constant-time comparison implementation</li>
<li><strong>Secret Management</strong>: Environment-based secret storage</li>
</ul>
<h2>Webhook Endpoints</h2>
<pre><code>POST /webhooks/{provider}
Content-Type: application/json
X-{Provider}-Signature: signature-header-value</code></pre>
<p><strong>Supported Providers</strong>: stripe, paypal, github</p>
<h2>Performance Characteristics</h2>
<ul>
<li><strong>Event Processing</strong>: 1000+ events/second per worker instance</li>
<li><strong>Horizontal Scaling</strong>: Multiple worker instances supported</li>
<li><strong>Queue Partitioning</strong>: Multiple queue instances for load distribution</li>
</ul>

  <script>
    document.getElementById('flow').addEventListener('click', function () {
      var trace = ['event_received -> provider=stripe id=evt_001','idempotency_check -> pass','queue_dispatch -> job=webhook:evt_001','worker_process -> status=completed'];
      document.getElementById('out').textContent = trace.join('\n');
    });
    function sparkline(values) {
      if (!Array.isArray(values) || values.length === 0) return 'n/a';
      var ticks = ['_','-','=','+','*','#','%','@'];
      var min = Math.min.apply(null, values), max = Math.max.apply(null, values);
      if (min === max) return values.map(function () { return '+'; }).join('');
      return values.map(function (v) { var idx = Math.floor(((v - min) / (max - min)) * (ticks.length - 1)); return ticks[idx]; }).join('');
    }
    async function loadBackendSimulation() {
      var statusOut = document.getElementById('api-out');
      var historyOut = document.getElementById('api-history');
      statusOut.textContent = 'Loading api/status.json...';
      historyOut.textContent = 'Loading api/history.json...';
      try {
        var statusResponse = await fetch('./api/status.json?ts=' + Date.now(), { cache: 'no-store' });
        if (!statusResponse.ok) throw new Error('status endpoint unavailable (HTTP ' + statusResponse.status + ')');
        statusOut.textContent = JSON.stringify(await statusResponse.json(), null, 2);
      } catch (error) { statusOut.textContent = 'backend simulation unavailable: ' + error.message; }
      try {
        var historyResponse = await fetch('./api/history.json?ts=' + Date.now(), { cache: 'no-store' });
        if (!historyResponse.ok) throw new Error('history endpoint unavailable (HTTP ' + historyResponse.status + ')');
        var historyData = await historyResponse.json();
        if (!Array.isArray(historyData)) throw new Error('invalid history payload format');
        var recent = historyData.slice(-10);
        var latency = recent.map(function (item) { return Number(item.latencyMs) || 0; });
        var success = recent.map(function (item) { return Number(item.successRate) || 0; });
        var lines = [];
        lines.push('history points: ' + historyData.length);
        lines.push('latency trend: ' + sparkline(latency) + ' (ms)');
        lines.push('success trend: ' + sparkline(success) + ' (%)');
        lines.push('recent entries:');
        recent.forEach(function (item) { lines.push('- ' + item.timestamp + ' | latency=' + item.latencyMs + 'ms | success=' + item.successRate + '% | events=' + item.eventsProcessed); });
        historyOut.textContent = lines.join('\n');
      } catch (error) { historyOut.textContent = 'history unavailable: ' + error.message; }
    }
    document.getElementById('load-api').addEventListener('click', loadBackendSimulation);
    loadBackendSimulation();
    (function(){document.querySelectorAll('[data-current-year]').forEach(function(n){n.textContent=String(new Date().getFullYear());});})();
  </script>
